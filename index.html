<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Exklusive Kontakte finden</title>
</head>
<body>
    <div class="live-indicator">Live</div>
    <div class="video-background-container">
        <div class="video-overlay"></div>
        <video autoplay loop muted playsinline>
            <source src="https://files.catbox.moe/1l6hnc.mp4" type="video/mp4">
        </video>
    </div>

    <!-- Contenedor único -->
    <div class="container">
        <h1>Finde mädchen Kontakte</h1>
        <p>Haz clic abajo para ver perfiles verificados en tu zona.</p>
        
        <!-- Botón único de redirección -->
        <button class="cta" onclick="redirectToOffer()">Ver perfiles ahora</button>

        <div class="footer">
            🔞 Nur für Personen über 18 Jahre
            <br>
            <span class="footer-warning">⚠️ Nach der Registrierung aktivieren Ihr Konto einfach über Ihre E-Mail-Adresse.</span>
        </div>
    </div>
</body>

<style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 10px; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; position: relative; background-color: #0a050f; }
    .video-background-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
    .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(10, 5, 15, 0.65), rgba(10, 5, 15, 0.65)); z-index: 1; }
    .live-indicator { position: fixed; top: 20px; left: 20px; background: rgba(255, 0, 51, 0.9); color: #ffffff; font-size: 13px; font-weight: 800; padding: 6px 12px; border-radius: 6px; letter-spacing: 1px; z-index: 2; text-transform: uppercase; box-shadow: 0 0 15px rgba(255, 0, 51, 0.6); display: flex; align-items: center; gap: 6px; animation: pulseLive 1.5s infinite ease-in-out; }
    .live-indicator::before { content: ''; display: inline-block; width: 8px; height: 8px; background-color: #ffffff; border-radius: 50%; }
    @keyframes pulseLive { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    .video-background-container video { width: 100%; height: 100%; object-fit: cover; animation: zoomBackground 16s infinite ease-in-out; }
    @keyframes zoomBackground { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.12); } }
    .container { width: 100%; max-width: 420px; background: rgba(18, 12, 24, 0.18); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(8px); padding: 35px 25px; border-radius: 24px; box-shadow: 0 15px 35px rgba(255, 20, 147, 0.15), 0 5px 15px rgba(0,0,0,0.5); text-align: center; border: 1px solid rgba(255, 45, 120, 0.25); position: relative; z-index: 2; }
    h1 { font-size: 24px; margin-bottom: 15px; color: #ffffff; font-weight: 800; background: linear-gradient(45deg, #ff2d78, #ff6b4a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p { font-size: 16px; line-height: 1.5; color: #e0d5ea; margin-bottom: 25px; }
    button.cta { background: linear-gradient(135deg, #ff0055 0%, #ff5500 100%); color: #ffffff; border: none; padding: 18px; font-size: 18px; font-weight: bold; border-radius: 14px; cursor: pointer; width: 100%; box-shadow: 0 6px 20px rgba(255, 0, 85, 0.4); animation: pulseButton 2.5s infinite ease-in-out; }
    @keyframes pulseButton { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }
    .footer { margin-top: 30px; font-size: 11px; color: #ff4088; border-top: 1px solid rgba(255, 45, 120, 0.15); padding-top: 15px; font-weight: 700; text-transform: uppercase; }
    .footer-warning { display: inline-block; margin-top: 12px; color: #F7DD59; border: 2px solid #ff0033; background: rgba(255, 0, 51, 0.15); padding: 10px 14px; border-radius: 10px; }
</style>

<script>
    function redirectToOffer() {
        // Redirección directa al hacer clic
        window.location.href = 'https://safeoffers.pro/a/68zZlCGprXuxwJE';
    }
</script>
